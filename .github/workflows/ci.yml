name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine (TypeScript core + Hono API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (static-analysis gate)
        run: npm run typecheck
      - name: Build (CommonJS dist)
        run: npm run build
      - name: Test (vitest — live integration tests skip without API keys)
        run: npm test

  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build (next build — catches RSC/route errors tsc + vitest miss)
        run: npm run build
      - name: Test
        run: npm test
